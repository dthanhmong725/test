<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh mục - CyberForum</title>
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">
      <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
    </a>
    <a href="/" class="btn btn-ghost" style="margin-left: 12px;">
      <i class="ti ti-arrow-left"></i> Quay lại
    </a>
  </nav>

  <main style="padding-top: calc(var(--navbar-height) + 20px);">
    <div class="container" style="max-width: 900px;">

      <!-- Category Header -->
      <div id="categoryHeader">
        <div class="skeleton" style="height: 120px; border-radius: var(--radius-md);"></div>
      </div>

      <!-- Posts List -->
      <div id="categoryContent">
        <!-- Filter bar -->
        <div class="d-flex justify-between align-center mb-4" style="margin-bottom: 16px;">
          <div class="d-flex gap-2 align-center">
            <select id="sortSelect" class="form-select" style="width: auto; padding: 6px 12px;">
              <option value="">Mới nhất</option>
              <option value="views">Xem nhiều nhất</option>
              <option value="comments">Bình luận nhiều nhất</option>
              <option value="oldest">Cũ nhất</option>
            </select>
          </div>
          <a href="/create-post.html" class="btn btn-primary requires-auth" style="display: none;">
            <i class="ti ti-plus"></i> Tạo bài viết
          </a>
        </div>

        <div id="postsList">
          <div class="skeleton" style="height: 110px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 110px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 110px;"></div>
        </div>

        <div id="pagination" class="pagination" style="margin-top: 16px;"></div>
      </div>
    </div>
  </main>

  <!-- Create Category Modal (Admin only) -->
  <div class="modal-overlay" id="createCategoryModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Tạo danh mục mới</h3>
        <button class="modal-close" onclick="closeCreateModal()">
          <i class="ti ti-x"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Tên danh mục</label>
          <input type="text" id="catName" class="form-input" placeholder="Ví dụ: Bài viết CTF">
        </div>
        <div class="form-group">
          <label class="form-label">Mô tả</label>
          <textarea id="catDesc" class="form-textarea" rows="2" placeholder="Mô tả ngắn về danh mục..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Biểu tượng (Tabler Icon)</label>
          <input type="text" id="catIcon" class="form-input" placeholder="Ví dụ: ti-flag (mặc định: ti-folder)" value="ti-folder">
          <span class="form-hint">Xem danh sách icons tại <a href="https://tabler-icons.io/" target="_blank" style="color: var(--accent);">tabler-icons.io</a></span>
        </div>
        <div class="form-group">
          <label class="form-label">Màu sắc (HEX)</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="color" id="catColorPicker" value="#388bfd" style="width: 44px; height: 38px; padding: 2px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-surface); cursor: pointer;">
            <input type="text" id="catColor" class="form-input" value="#388bfd" placeholder="#388bfd" style="flex: 1;">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Thứ tự hiển thị</label>
          <input type="number" id="catOrder" class="form-input" value="0" min="0" style="width: 120px;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateModal()">Hủy</button>
        <button class="btn btn-primary" id="createCatBtn" onclick="submitCreateCategory()">
          Tạo danh mục
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/role-guard.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');
    let currentPage = 1;
    let currentCategory = null;

    async function init() {
      if (!slug) { window.location.href = '/'; return; }

      await AuthManager.restoreSession();
      AuthManager.updateUI();
      RoleGuard.applyVisibility();

      if (RoleGuard.canManageCategories()) {
        setupAdminActions();
      }

      await loadCategory();
      await loadPosts(1);
      setupEventListeners();
    }

    async function loadCategory() {
      try {
        const result = await API.categories.getBySlug(slug);
        if (!result.success) {
          document.getElementById('categoryHeader').innerHTML = `
            <div class="empty-state">
              <i class="ti ti-category"></i>
              <h3>Không tìm thấy danh mục</h3>
              <p>Danh mục này có thể đã bị xóa hoặc không tồn tại.</p>
              <a href="/" class="btn btn-primary mt-3">Về trang chủ</a>
            </div>`;
          return;
        }

        currentCategory = result.data;
        renderCategoryHeader(currentCategory);
        document.title = `${currentCategory.name} - CyberForum`;
      } catch (e) {
        document.getElementById('categoryHeader').innerHTML = `
          <div class="empty-state">
            <i class="ti ti-alert-circle"></i>
            <h3>Lỗi khi tải danh mục</h3>
          </div>`;
      }
    }

    function renderCategoryHeader(cat) {
      const colorStyle = cat.color + '22';
      document.getElementById('categoryHeader').innerHTML = `
        <div style="padding: 24px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 20px;">
          <div style="display: flex; align-items: flex-start; gap: 16px;">
            <div style="width: 56px; height: 56px; border-radius: var(--radius-md); background: ${colorStyle}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
              <i class="ti ti-${cat.icon.replace('ti-', '')}" style="font-size: 1.5rem; color: ${cat.color};"></i>
            </div>
            <div style="flex: 1;">
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px;">
                <h1 style="font-size: 1.375rem; margin: 0;">${cat.name}</h1>
                <span class="badge" style="background: ${colorStyle}; color: ${cat.color};">
                  <i class="ti ti-article" style="font-size: 0.6875rem;"></i> ${cat.postCount} bài
                </span>
              </div>
              ${cat.description ? `<p style="color: var(--text-secondary); font-size: 0.9375rem; line-height: 1.6; margin: 0 0 10px;">${cat.description}</p>` : ''}
              <div style="font-size: 0.8125rem; color: var(--text-muted);">
                <i class="ti ti-calendar"></i> Tạo ngày ${formatDate(cat.createdAt)}
              </div>
            </div>
            ${RoleGuard.canManageCategories() ? `
              <div style="display: flex; gap: 6px; flex-shrink: 0;">
                <button class="btn btn-ghost btn-sm" onclick="openEditModal()" title="Sửa danh mục">
                  <i class="ti ti-edit"></i>
                </button>
                <button class="btn btn-ghost btn-sm" onclick="deleteCategory()" title="Xóa danh mục" style="color: var(--accent-red);">
                  <i class="ti ti-trash"></i>
                </button>
              </div>
            ` : ''}
          </div>
        </div>`;
    }

    async function loadPosts(page = 1) {
      currentPage = page;
      const sort = document.getElementById('sortSelect').value;

      const container = document.getElementById('postsList');
      container.innerHTML = `
        <div class="skeleton" style="height: 110px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 110px; margin-bottom: 12px;"></div>`;

      try {
        const result = await API.categories.getPostsBySlug(slug, { page, pageSize: 15, sortBy: sort });
        if (!result.success) {
          container.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><h3>Lỗi khi tải bài viết</h3></div>`;
          return;
        }

        const posts = result.data || [];
        if (!posts.length) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="ti ti-article-off"></i>
              <h3>Chưa có bài viết nào</h3>
              <p>Hãy là người đầu tiên đăng bài trong danh mục này!</p>
              <a href="/create-post.html?category=${slug}" class="btn btn-primary mt-3 requires-auth requires-user" style="display: none;">Tạo bài viết</a>
            </div>`;
          RoleGuard.applyVisibility();
          return;
        }

        container.innerHTML = posts.map(post => renderPostCard(post)).join('');
        renderPagination(result);
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><h3>Lỗi khi tải bài viết</h3></div>`;
      }
    }

    function renderPostCard(post) {
      const cat = currentCategory || {};
      return `
        <article class="post-card ${post.isPinned ? 'pinned' : ''}">
          <div class="post-votes">
            <button class="vote-btn ${post.userVote === 1 ? 'upvoted' : ''}" onclick="votePost(${post.id}, true)">
              <i class="ti ti-arrow-up"></i>
            </button>
            <span class="vote-count ${post.upvoteCount - post.downvoteCount > 0 ? 'positive' : post.upvoteCount - post.downvoteCount < 0 ? 'negative' : ''}">
              ${post.upvoteCount - post.downvoteCount}
            </span>
            <button class="vote-btn ${post.userVote === -1 ? 'downvoted' : ''}" onclick="votePost(${post.id}, false)">
              <i class="ti ti-arrow-down"></i>
            </button>
          </div>
          <div class="post-content">
            <div class="d-flex justify-between align-start gap-2">
              <a href="/post.html?id=${post.id}" class="post-title" style="text-decoration: none;">
                ${post.isPinned ? '<span class="badge badge-success" style="margin-right: 6px; font-size: 0.625rem;"><i class="ti ti-pinned"></i> Đã ghim</span>' : ''}
                ${post.isLocked ? '<i class="ti ti-lock" style="color: var(--text-muted); margin-right: 4px;"></i>' : ''}
                ${post.title}
              </a>
            </div>
            <div class="post-meta">
              <div class="d-flex align-center gap-2">
                <div class="avatar avatar-sm">${(post.authorUsername || 'U').charAt(0).toUpperCase()}</div>
                <a href="/profile.html?username=${post.authorUsername}" style="color: inherit; text-decoration: none;">
                  <span>${post.authorUsername}</span>
                  ${post.authorRole && post.authorRole !== 'User' ? RoleGuard.renderRoleBadge(post.authorRole) : ''}
                </a>
              </div>
              <span class="post-meta-item"><i class="ti ti-clock"></i> ${formatTimeAgo(post.createdAt)}</span>
              <span class="post-meta-item"><i class="ti ti-eye"></i> ${post.viewCount}</span>
              <span class="post-meta-item"><i class="ti ti-message"></i> ${post.commentCount}</span>
            </div>
            ${post.tags && post.tags.length ? `
              <div class="post-tags">
                ${post.tags.map(tag => `<span class="post-tag">${tag}</span>`).join('')}
              </div>
            ` : ''}
          </div>
          <button class="btn btn-ghost bookmark-btn ${post.isBookmarked ? 'bookmarked' : ''}"
            onclick="toggleBookmark(${post.id}, this)" style="align-self: flex-start; color: ${post.isBookmarked ? 'var(--accent)' : ''};">
            <i class="${post.isBookmarked ? 'ti ti-bookmark-filled' : 'ti ti-bookmark'}"></i>
          </button>
        </article>`;
    }

    function renderPagination(result) {
      const container = document.getElementById('pagination');
      const totalPages = Math.ceil(result.totalItems / result.pageSize);
      if (totalPages <= 1) { container.innerHTML = ''; return; }

      let html = '';
      const current = result.page;
      if (current > 1) html += `<button class="pagination-btn" onclick="loadPosts(${current - 1})"><i class="ti ti-chevron-left"></i></button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= current - 1 && i <= current + 1)) {
          html += `<button class="pagination-btn ${i === current ? 'active' : ''}" onclick="loadPosts(${i})">${i}</button>`;
        } else if (i === current - 2 || i === current + 2) {
          html += `<span style="color: var(--text-muted); padding: 0 4px;">...</span>`;
        }
      }
      if (current < totalPages) html += `<button class="pagination-btn" onclick="loadPosts(${current + 1})"><i class="ti ti-chevron-right"></i></button>`;
      container.innerHTML = html;
    }

    function setupEventListeners() {
      document.getElementById('sortSelect').addEventListener('change', () => loadPosts(1));
      document.getElementById('catColorPicker')?.addEventListener('input', (e) => {
        document.getElementById('catColor').value = e.target.value;
      });
      document.getElementById('catColor')?.addEventListener('input', (e) => {
        document.getElementById('catColorPicker').value = e.target.value;
      });
    }

    function setupAdminActions() {
      const header = document.getElementById('categoryHeader');
    }

    function openCreateModal() {
      document.getElementById('createCategoryModal').classList.add('active');
    }

    function closeCreateModal() {
      document.getElementById('createCategoryModal').classList.remove('active');
    }

    async function submitCreateCategory() {
      const name = document.getElementById('catName').value.trim();
      const description = document.getElementById('catDesc').value.trim();
      const icon = document.getElementById('catIcon').value.trim() || 'ti-folder';
      const color = document.getElementById('catColor').value.trim() || '#388bfd';
      const displayOrder = parseInt(document.getElementById('catOrder').value) || 0;

      if (!name) { Toast.show('Vui lòng nhập tên danh mục', 'warning'); return; }

      const btn = document.getElementById('createCatBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner" style="display: inline-block; width: 16px; height: 16px; border-width: 2px;"></span>';

      try {
        const result = await API.categories.create({ name, description, icon, color, displayOrder });
        if (result.success) {
          Toast.show('Đã tạo danh mục mới', 'success');
          closeCreateModal();
          window.location.href = `/category.html?slug=${result.data.slug}`;
        } else {
          Toast.show(result.message || 'Không thể tạo danh mục', 'error');
        }
      } catch (e) {
        Toast.show('Lỗi khi tạo danh mục', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Tạo danh mục';
      }
    }

    async function deleteCategory() {
      if (!currentCategory) return;
      if (!confirm(`Xóa danh mục "${currentCategory.name}"?\n\nLưu ý: Chỉ có thể xóa danh mục không có bài viết nào.`)) return;

      try {
        const result = await API.categories.delete(currentCategory.id);
        if (result.success) {
          Toast.show('Đã xóa danh mục', 'success');
          window.location.href = '/';
        } else {
          Toast.show(result.message || 'Không thể xóa danh mục', 'error');
        }
      } catch (e) {
        Toast.show('Lỗi khi xóa danh mục', 'error');
      }
    }

    async function votePost(postId, isUpvote) {
      if (!AuthManager.isAuthenticated()) { Toast.show('Vui lòng đăng nhập để bình chọn', 'warning'); return; }
      try {
        await API.posts.vote(postId, isUpvote);
        await loadPosts(currentPage);
      } catch (e) { Toast.show(e.message, 'error'); }
    }

    async function toggleBookmark(postId, btn) {
      if (!AuthManager.isAuthenticated()) { Toast.show('Vui lòng đăng nhập để lưu bài', 'warning'); return; }
      const isBookmarked = btn.classList.contains('bookmarked');
      try {
        if (isBookmarked) {
          await API.posts.removeBookmark(postId);
          btn.classList.remove('bookmarked');
          btn.style.color = '';
          btn.querySelector('i').className = 'ti ti-bookmark';
        } else {
          await API.posts.addBookmark(postId);
          btn.classList.add('bookmarked');
          btn.style.color = 'var(--accent)';
          btn.querySelector('i').className = 'ti ti-bookmark-filled';
        }
        Toast.show(isBookmarked ? 'Đã bỏ lưu' : 'Đã lưu bài viết', 'success');
      } catch (e) { Toast.show(e.message, 'error'); }
    }

    function formatTimeAgo(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);
      if (seconds < 60) return 'vài giây trước';
      if (seconds < 3600) return `${Math.floor(seconds / 60)} phút trước`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)} giờ trước`;
      if (seconds < 604800) return `${Math.floor(seconds / 86400)} ngày trước`;
      return date.toLocaleDateString('vi-VN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString('vi-VN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
