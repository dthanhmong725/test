<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản trị - CyberForum</title>
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body style="background: var(--bg-primary); min-height: 100vh;">
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="/" class="logo">
        <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
      </a>
      <div style="flex: 1;"></div>
      <a href="/" class="btn btn-ghost btn-sm">
        <i class="ti ti-home"></i> Quay lại diễn đàn
      </a>
      <a href="/profile.html" class="btn btn-ghost btn-sm user-menu" style="display: none;">
        <span class="user-avatar avatar avatar-sm"></span>
        <span class="user-name" style="margin-left: 6px;"></span>
      </a>
      <button class="btn btn-ghost btn-sm" onclick="AuthManager.logout()" id="logoutBtn" style="display: none;">
        <i class="ti ti-logout"></i>
      </button>
    </nav>

    <div class="main-content" style="margin-top: var(--navbar-height);">
      <div class="container">
        <!-- Header -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
          <div>
            <h1 style="font-size: 1.5rem; display: flex; align-items: center; gap: 10px;">
              <i class="ti ti-settings" style="color: var(--accent);"></i>
              Bảng quản trị
            </h1>
            <p class="text-muted" style="font-size: 0.875rem; margin-top: 4px;">
              Chào mừng, <strong id="adminName">Quản trị viên</strong>
            </p>
          </div>
        </div>

        <!-- Tab Navigation -->
        <div class="card" style="padding: 0; margin-bottom: 20px; overflow: hidden;">
          <div style="display: flex; border-bottom: 1px solid var(--border); overflow-x: auto;">
            <button class="admin-tab active" data-tab="users" style="
              padding: 12px 20px; background: none; border: none; cursor: pointer;
              font-size: 0.875rem; font-weight: 500; color: var(--accent);
              border-bottom: 2px solid var(--accent); white-space: nowrap;">
              <i class="ti ti-users"></i> Người dùng
            </button>
            <button class="admin-tab" data-tab="security" style="
              padding: 12px 20px; background: none; border: none; cursor: pointer;
              font-size: 0.875rem; font-weight: 500; color: var(--text-muted);
              border-bottom: 2px solid transparent; white-space: nowrap;">
              <i class="ti ti-shield-lock"></i> Nhật ký bảo mật
            </button>
            <button class="admin-tab" data-tab="permissions" style="
              padding: 12px 20px; background: none; border: none; cursor: pointer;
              font-size: 0.875rem; font-weight: 500; color: var(--text-muted);
              border-bottom: 2px solid transparent; white-space: nowrap;">
              <i class="ti ti-lock"></i> Phân quyền
            </button>
          </div>

          <!-- Users Tab -->
          <div id="tab-users" class="admin-tab-content" style="padding: 20px;">
            <!-- Filters -->
            <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
              <div style="flex: 1; min-width: 200px;">
                <input type="text" id="userSearch" class="form-input" placeholder="Tìm kiếm tên đăng nhập...">
              </div>
              <select id="roleFilter" class="form-select" style="width: auto; min-width: 140px;">
                <option value="">Tất cả vai trò</option>
                <option value="User">Người dùng</option>
                <option value="Moderator">Điều hành viên</option>
                <option value="Admin">Quản trị viên</option>
              </select>
              <select id="banFilter" class="form-select" style="width: auto; min-width: 140px;">
                <option value="">Tất cả</option>
                <option value="false">Đang hoạt động</option>
                <option value="true">Đã bị khóa</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="AdminPanel.loadUsers(1)">
                <i class="ti ti-search"></i> Tìm kiếm
              </button>
            </div>

            <!-- Users Table -->
            <div style="overflow-x: auto;">
              <table style="width: 100%; border-collapse: collapse; font-size: 0.875rem; min-width: 700px;">
                <thead>
                  <tr style="border-bottom: 1px solid var(--border);">
                    <th style="text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Người dùng</th>
                    <th style="text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Email</th>
                    <th style="text-align: center; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Vai trò</th>
                    <th style="text-align: center; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Điểm</th>
                    <th style="text-align: center; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Trạng thái</th>
                    <th style="text-align: center; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Thao tác</th>
                  </tr>
                </thead>
                <tbody id="usersTableBody">
                  <tr>
                    <td colspan="6" style="padding: 40px; text-align: center; color: var(--text-muted);">
                      <span class="loading-spinner" style="display: inline-block;"></span>
                      <p style="margin-top: 8px;">Đang tải...</p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <div id="usersPagination" class="pagination" style="margin-top: 16px;"></div>
          </div>

          <!-- Security Logs Tab -->
          <div id="tab-security" class="admin-tab-content" style="padding: 20px; display: none;">
            <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
              <select id="logUserFilter" class="form-select" style="width: auto; min-width: 160px;">
                <option value="">Tất cả người dùng</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="AdminPanel.loadSecurityLogs(1)">
                <i class="ti ti-refresh"></i> Tải lại
              </button>
            </div>

            <div id="securityLogsContainer">
              <table style="width: 100%; border-collapse: collapse; font-size: 0.875rem;">
                <thead>
                  <tr style="border-bottom: 1px solid var(--border);">
                    <th style="text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Thời gian</th>
                    <th style="text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Người dùng</th>
                    <th style="text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Sự kiện</th>
                    <th style="text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">Chi tiết</th>
                    <th style="text-align: center; padding: 10px 12px; color: var(--text-muted); font-weight: 500;">IP</th>
                  </tr>
                </thead>
                <tbody id="securityLogsBody">
                  <tr>
                    <td colspan="5" style="padding: 40px; text-align: center; color: var(--text-muted);">
                      <span class="loading-spinner" style="display: inline-block;"></span>
                      <p style="margin-top: 8px;">Đang tải nhật ký...</p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div id="securityPagination" class="pagination" style="margin-top: 16px;"></div>
          </div>

          <!-- Permissions Tab -->
          <div id="tab-permissions" class="admin-tab-content" style="padding: 20px; display: none;">
            <h3 style="font-size: 1rem; margin-bottom: 16px;">Ma trận phân quyền</h3>
            <div id="permissionMatrix"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Role Change Modal -->
  <div class="modal-overlay" id="roleModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Thay đổi vai trò</h3>
        <button class="modal-close" onclick="AdminPanel.closeRoleModal()">
          <i class="ti ti-x"></i>
        </button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: 16px; color: var(--text-secondary); font-size: 0.875rem;">
          Đang thay đổi vai trò cho: <strong id="modalTargetUser"></strong>
        </p>
        <div class="form-group">
          <label class="form-label">Vai trò mới</label>
          <select id="newRoleSelect" class="form-select">
            <option value="User">Người dùng</option>
            <option value="Moderator">Điều hành viên</option>
            <option value="Admin">Quản trị viên</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="AdminPanel.closeRoleModal()">Hủy</button>
        <button class="btn btn-primary" id="confirmRoleBtn" onclick="AdminPanel.confirmRoleChange()">
          Xác nhận
        </button>
      </div>
    </div>
  </div>

  <!-- Ban Modal -->
  <div class="modal-overlay" id="banModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Khóa tài khoản</h3>
        <button class="modal-close" onclick="AdminPanel.closeBanModal()">
          <i class="ti ti-x"></i>
        </button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: 16px; color: var(--text-secondary); font-size: 0.875rem;">
          Khóa tài khoản: <strong id="banTargetUser"></strong>
        </p>
        <div class="form-group">
          <label class="form-label">Lý do khóa</label>
          <textarea id="banReasonInput" class="form-textarea" rows="3" placeholder="Nhập lý do khóa tài khoản..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="AdminPanel.closeBanModal()">Hủy</button>
        <button class="btn btn-danger" id="confirmBanBtn" onclick="AdminPanel.confirmBan()">
          <i class="ti ti-ban"></i> Khóa tài khoản
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/role-guard.js"></script>
  <script>
    const AdminPanel = {
      currentUserId: null,
      currentRole: null,
      currentBanUserId: null,
      currentPage: 1,

      async init() {
        await AuthManager.restoreSession();

        if (!AuthManager.isAdmin()) {
          Toast.show('Bạn không có quyền truy cập trang quản trị', 'error');
          window.location.href = '/login.html';
          return;
        }

        const user = AuthManager.getUser();
        if (user) {
          document.getElementById('adminName').textContent = user.displayName || user.username;
        }

        AuthManager.updateUI();
        this.setupTabs();
        this.setupSearch();
        this.loadUsers(1);
        this.renderPermissionMatrix();
        RoleGuard.applyVisibility();
      },

      setupTabs() {
        document.querySelectorAll('.admin-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.admin-tab').forEach(t => {
              t.classList.remove('active');
              t.style.color = 'var(--text-muted)';
              t.style.borderBottomColor = 'transparent';
            });
            tab.classList.add('active');
            tab.style.color = 'var(--accent)';
            tab.style.borderBottomColor = 'var(--accent)';

            document.querySelectorAll('.admin-tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(`tab-${tab.dataset.tab}`).style.display = 'block';

            if (tab.dataset.tab === 'security') {
              this.loadSecurityLogs(1);
            }
          });
        });
      },

      setupSearch() {
        const searchInput = document.getElementById('userSearch');
        let debounce;
        searchInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') this.loadUsers(1);
        });

        document.getElementById('roleFilter').addEventListener('change', () => this.loadUsers(1));
        document.getElementById('banFilter').addEventListener('change', () => this.loadUsers(1));
      },

      async loadUsers(page) {
        this.currentPage = page;
        const search = document.getElementById('userSearch').value;
        const role = document.getElementById('roleFilter').value;
        const isBanned = document.getElementById('banFilter').value;

        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="padding: 40px; text-align: center; color: var(--text-muted);">
              <span class="loading-spinner" style="display: inline-block;"></span>
              <p style="margin-top: 8px;">Đang tải...</p>
            </td>
          </tr>`;

        try {
          const result = await API.admin.getUsers({
            page,
            pageSize: 15,
            search: search || undefined,
            role: role || undefined,
            isBanned: isBanned ? isBanned === 'true' : undefined
          });

          if (!result.success) {
            tbody.innerHTML = `<tr><td colspan="6" style="padding: 20px; text-align: center; color: var(--accent-red);">${result.message}</td></tr>`;
            return;
          }

          const users = result.data || [];
          if (users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="padding: 40px; text-align: center; color: var(--text-muted);">Không tìm thấy người dùng nào.</td></tr>`;
            return;
          }

          tbody.innerHTML = users.map(user => this.renderUserRow(user)).join('');

          this.renderPagination(result);
        } catch (e) {
          tbody.innerHTML = `<tr><td colspan="6" style="padding: 20px; text-align: center; color: var(--accent-red);">Lỗi khi tải danh sách người dùng.</td></tr>`;
        }
      },

      renderUserRow(user) {
        const currentUser = AuthManager.getUser();
        const isSelf = currentUser?.id === user.id;
        const isAdmin = user.role === 'Admin';

        const statusBadge = user.isBanned
          ? `<span class="badge badge-danger"><i class="ti ti-ban"></i> Đã khóa</span>`
          : `<span class="badge badge-success"><i class="ti ti-check"></i> Hoạt động</span>`;

        const roleBadge = AuthManager.renderRoleBadge(user.role);

        const actionBtns = [];
        if (!isSelf && !isAdmin) {
          actionBtns.push(`
            <button class="btn btn-sm btn-ghost" onclick="AdminPanel.openRoleModal(${user.id}, '${user.username}', '${user.role}')" title="Đổi vai trò">
              <i class="ti ti-user-cog"></i>
            </button>`);

          if (user.isBanned) {
            actionBtns.push(`
            <button class="btn btn-sm btn-ghost" onclick="AdminPanel.unbanUser(${user.id})" title="Mở khóa" style="color: var(--accent);">
              <i class="ti ti-user-check"></i>
            </button>`);
          } else {
            actionBtns.push(`
            <button class="btn btn-sm btn-ghost" onclick="AdminPanel.openBanModal(${user.id}, '${user.username}')" title="Khóa" style="color: var(--accent-red);">
              <i class="ti ti-ban"></i>
            </button>`);
          }
        }

        return `
          <tr style="border-bottom: 1px solid var(--border); transition: background 0.15s;"
              onmouseover="this.style.background='var(--bg-surface2)'"
              onmouseout="this.style.background=''">
            <td style="padding: 12px;">
              <div style="display: flex; align-items: center; gap: 10px;">
                <span class="avatar avatar-sm">${(user.displayName || user.username).charAt(0).toUpperCase()}</span>
                <div>
                  <div style="font-weight: 500; display: flex; align-items: center; gap: 6px;">
                    ${user.displayName || user.username}
                    ${roleBadge}
                  </div>
                  <div style="font-size: 0.75rem; color: var(--text-muted);">@${user.username}</div>
                </div>
              </div>
            </td>
            <td style="padding: 12px; color: var(--text-secondary); font-size: 0.8125rem;">${user.email}</td>
            <td style="padding: 12px; text-align: center;">${roleBadge || '<span style="color: var(--text-muted); font-size: 0.8125rem;">Người dùng</span>'}</td>
            <td style="padding: 12px; text-align: center; font-weight: 600; color: var(--accent);">${user.reputationPoints}</td>
            <td style="padding: 12px; text-align: center;">${statusBadge}</td>
            <td style="padding: 12px; text-align: center;">
              <div style="display: flex; gap: 4px; justify-content: center;">
                ${actionBtns.join('')}
              </div>
            </td>
          </tr>`;
      },

      renderPagination(result) {
        const totalPages = Math.ceil(result.totalItems / result.pageSize);
        if (totalPages <= 1) {
          document.getElementById('usersPagination').innerHTML = '';
          return;
        }

        const current = result.page;
        let html = '';

        if (current > 1) {
          html += `<button class="pagination-btn" onclick="AdminPanel.loadUsers(${current - 1})"><i class="ti ti-chevron-left"></i></button>`;
        }

        for (let i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= current - 1 && i <= current + 1)) {
            html += `<button class="pagination-btn ${i === current ? 'active' : ''}" onclick="AdminPanel.loadUsers(${i})">${i}</button>`;
          } else if (i === current - 2 || i === current + 2) {
            html += `<span style="color: var(--text-muted); padding: 0 4px;">...</span>`;
          }
        }

        if (current < totalPages) {
          html += `<button class="pagination-btn" onclick="AdminPanel.loadUsers(${current + 1})"><i class="ti ti-chevron-right"></i></button>`;
        }

        document.getElementById('usersPagination').innerHTML = html;
      },

      openRoleModal(userId, username, currentRole) {
        this.currentUserId = userId;
        document.getElementById('modalTargetUser').textContent = '@' + username;
        document.getElementById('newRoleSelect').value = currentRole;
        document.getElementById('roleModal').classList.add('active');
      },

      closeRoleModal() {
        document.getElementById('roleModal').classList.remove('active');
        this.currentUserId = null;
      },

      async confirmRoleChange() {
        if (!this.currentUserId) return;
        const newRole = document.getElementById('newRoleSelect').value;
        const btn = document.getElementById('confirmRoleBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner" style="display: inline-block; width: 16px; height: 16px; border-width: 2px;"></span>';

        try {
          const result = await API.admin.changeRole(this.currentUserId, newRole);
          if (result.success) {
            Toast.show('Đã thay đổi vai trò thành công', 'success');
            this.closeRoleModal();
            this.loadUsers(this.currentPage);
          } else {
            Toast.show(result.message || 'Không thể thay đổi vai trò', 'error');
          }
        } catch (e) {
          Toast.show('Lỗi khi thay đổi vai trò', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Xác nhận';
        }
      },

      openBanModal(userId, username) {
        this.currentBanUserId = userId;
        document.getElementById('banTargetUser').textContent = '@' + username;
        document.getElementById('banReasonInput').value = '';
        document.getElementById('banModal').classList.add('active');
      },

      closeBanModal() {
        document.getElementById('banModal').classList.remove('active');
        this.currentBanUserId = null;
      },

      async confirmBan() {
        if (!this.currentBanUserId) return;
        const reason = document.getElementById('banReasonInput').value.trim() || 'Vi phạm nội quy';
        const btn = document.getElementById('confirmBanBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner" style="display: inline-block; width: 16px; height: 16px; border-width: 2px;"></span>';

        try {
          const result = await API.admin.banUser(this.currentBanUserId, reason);
          if (result.success) {
            Toast.show('Đã khóa tài khoản thành công', 'success');
            this.closeBanModal();
            this.loadUsers(this.currentPage);
          } else {
            Toast.show(result.message || 'Không thể khóa tài khoản', 'error');
          }
        } catch (e) {
          Toast.show('Lỗi khi khóa tài khoản', 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="ti ti-ban"></i> Khóa tài khoản';
        }
      },

      async unbanUser(userId) {
        if (!confirm('Mở khóa tài khoản này?')) return;
        try {
          const result = await API.admin.unbanUser(userId);
          if (result.success) {
            Toast.show('Đã mở khóa tài khoản', 'success');
            this.loadUsers(this.currentPage);
          } else {
            Toast.show(result.message || 'Không thể mở khóa', 'error');
          }
        } catch (e) {
          Toast.show('Lỗi khi mở khóa tài khoản', 'error');
        }
      },

      async loadSecurityLogs(page) {
        const tbody = document.getElementById('securityLogsBody');
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="padding: 40px; text-align: center; color: var(--text-muted);">
              <span class="loading-spinner" style="display: inline-block;"></span>
              <p style="margin-top: 8px;">Đang tải...</p>
            </td>
          </tr>`;

        try {
          const result = await API.admin.getSecurityLogs({ page, pageSize: 50 });
          if (!result.success) {
            tbody.innerHTML = `<tr><td colspan="5" style="padding: 20px; text-align: center; color: var(--accent-red);">${result.message}</td></tr>`;
            return;
          }

          const logs = result.data || [];
          if (logs.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--text-muted);">Chưa có nhật ký bảo mật nào.</td></tr>`;
            return;
          }

          tbody.innerHTML = logs.map(log => {
            const eventIcon = this.getEventIcon(log.eventType);
            const eventColor = log.isSuccess ? 'var(--accent)' : 'var(--accent-red)';
            const time = new Date(log.createdAt).toLocaleString('vi-VN');

            return `
              <tr style="border-bottom: 1px solid var(--border);">
                <td style="padding: 10px 12px; font-size: 0.8125rem; color: var(--text-muted);">${time}</td>
                <td style="padding: 10px 12px; font-size: 0.8125rem;">${log.username || '<span style="color: var(--text-muted);">Hệ thống</span>'}</td>
                <td style="padding: 10px 12px;">
                  <span style="color: ${eventColor}; font-size: 0.8125rem;">
                    ${eventIcon} ${log.eventType}
                  </span>
                </td>
                <td style="padding: 10px 12px; font-size: 0.8125rem; color: var(--text-secondary);">${log.details || ''}</td>
                <td style="padding: 10px 12px; font-size: 0.75rem; color: var(--text-muted);">${log.ipAddress}</td>
              </tr>`;
          }).join('');
        } catch (e) {
          tbody.innerHTML = `<tr><td colspan="5" style="padding: 20px; text-align: center; color: var(--accent-red);">Lỗi khi tải nhật ký.</td></tr>`;
        }
      },

      getEventIcon(eventType) {
        const icons = {
          'ROLE_CHANGED': '<i class="ti ti-user-cog" style="font-size: 0.875rem;"></i>',
          'USER_BANNED': '<i class="ti ti-ban" style="font-size: 0.875rem;"></i>',
          'USER_UNBANNED': '<i class="ti ti-user-check" style="font-size: 0.875rem;"></i>',
          'LOGIN': '<i class="ti ti-login" style="font-size: 0.875rem;"></i>',
          'LOGOUT': '<i class="ti ti-logout" style="font-size: 0.875rem;"></i>',
          'REGISTER': '<i class="ti ti-user-plus" style="font-size: 0.875rem;"></i>',
        };
        return icons[eventType] || '<i class="ti ti-shield" style="font-size: 0.875rem;"></i>';
      },

      renderPermissionMatrix() {
        const container = document.getElementById('permissionMatrix');
        container.innerHTML = RoleGuard.buildPermissionMatrix();
      }
    };

    document.addEventListener('DOMContentLoaded', () => AdminPanel.init());
  </script>
</body>
</html>
