<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - CyberForum</title>
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
  <div style="width: 100%; max-width: 400px; padding: 24px;">
    <div class="text-center mb-4">
      <a href="/" style="color: var(--accent); text-decoration: none;">
        <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 40px; width: auto;">
      </a>
      <h1 style="font-size: 1.375rem; margin-top: 12px;">Chào mừng trở lại</h1>
      <p class="text-muted" style="font-size: 0.875rem;">Đăng nhập vào tài khoản CyberForum</p>
    </div>

    <form id="loginForm" class="card">
      <div class="form-group">
        <label class="form-label">Tên đăng nhập hoặc Email</label>
        <div style="position: relative;">
          <input type="text" name="username" id="usernameInput" class="form-input" placeholder="Nhập tên đăng nhập hoặc email" required
                 style="padding-left: 40px;">
          <i class="ti ti-user" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <div style="position: relative;">
          <i class="ti ti-lock" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; z-index: 1;"></i>
          <input type="password" name="password" id="passwordInput" class="form-input" placeholder="Nhập mật khẩu" required
                 style="padding-left: 38px; padding-right: 38px;">
          <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; z-index: 1;">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-between align-center mb-3" style="margin-bottom: 16px;">
        <label class="d-flex align-center gap-2" style="cursor: pointer; font-size: 0.875rem; color: var(--text-secondary);">
          <input type="checkbox" name="remember" style="accent-color: var(--accent);">
          <span>Ghi nhớ đăng nhập</span>
        </label>
        <a href="/forgot-password.html" style="font-size: 0.875rem; color: var(--accent);">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn btn-primary w-100" id="submitBtn" style="padding: 11px;">
        <span class="btn-text">
          <i class="ti ti-login" style="margin-right: 6px;"></i>
          Đăng nhập
        </span>
        <span class="loading-spinner" style="display: none;"></span>
      </button>

      <div id="errorMessage" class="form-error mt-3" style="display: none;"></div>
    </form>

    <p class="text-center mt-4 text-muted" style="font-size: 0.875rem;">
      Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a>
    </p>

    <div style="margin-top: 32px; border-top: 1px solid var(--border); padding-top: 24px;">
      <p class="text-center text-muted" style="font-size: 0.75rem;">
        <i class="ti ti-info-circle"></i> Tài khoản mặc định để test:<br>
        Username: <code style="background: var(--bg-surface2); padding: 2px 6px; border-radius: 4px;">admin</code><br>
        Password: <code style="background: var(--bg-surface2); padding: 2px 6px; border-radius: 4px;">Admin@123</code>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Nếu user đã đăng nhập (restoreSession đã set) thì không redirect
      if (AuthManager.isAuthenticated()) {
        window.location.href = '/';
        return;
      }

      const toggleBtn = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('passwordInput');

      toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        toggleBtn.innerHTML = `<i class="ti ti-eye${isPassword ? '-off' : ''}"></i>`;
      });

      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMessage');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const data = {
          username: formData.get('username'),
          password: formData.get('password'),
          rememberMe: formData.get('remember') === 'on'
        };

        submitBtn.disabled = true;
        submitBtn.querySelector('.btn-text').innerHTML = '<span class="loading-spinner" style="display: inline-block; margin-right: 6px;"></span> Đang đăng nhập...';
        errorDiv.style.display = 'none';

        try {
          const result = await API.auth.login(data);
          if (result && (result.success || result.Success)) {
            try {
              await AuthManager.login(result.data.accessToken, result.data.refreshToken, result.data.user);
            } catch (e) {
              console.warn('AuthManager login warning:', e);
            }
            window.location.replace('/');
          } else {
            errorDiv.textContent = (result && (result.message || result.Message)) || 'Đăng nhập thất bại';
            errorDiv.style.display = 'block';
          }
        } catch (error) {
          errorDiv.textContent = error.message || 'Có lỗi xảy ra';
          errorDiv.style.display = 'block';
        }
        submitBtn.disabled = false;
        submitBtn.querySelector('.btn-text').innerHTML = '<i class="ti ti-login" style="margin-right: 6px;"></i> Đăng nhập';
      });
    });
  </script>
</body>
</html>
