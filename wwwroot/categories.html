<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tất cả danh mục - CyberForum</title>
  <link rel="stylesheet" href="/css/themes/cyber.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">
      <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
    </a>
    <a href="/" class="btn btn-ghost" style="margin-left: 12px;">
      <i class="ti ti-arrow-left"></i> Quay lại
    </a>
    <button id="createCatBtn" class="btn btn-ghost btn-sm requires-admin" style="display: none; margin-left: auto;" onclick="openCreateModal()">
      <i class="ti ti-plus"></i> Tạo danh mục
    </button>
  </nav>

  <main style="padding-top: calc(var(--navbar-height) + 20px);">
    <div class="container" style="max-width: 900px;">

      <!-- Page Header -->
      <div style="margin-bottom: 24px;">
        <h1 style="font-size: 1.5rem; display: flex; align-items: center; gap: 10px;">
          <i class="ti ti-category" style="color: var(--accent);"></i>
          Tất cả danh mục
        </h1>
        <p class="text-muted" style="font-size: 0.875rem; margin-top: 4px;">
          Khám phá các chủ đề trong diễn đàn CyberForum
        </p>
      </div>

      <!-- Categories Grid -->
      <div id="categoriesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
        <div class="skeleton" style="height: 160px; border-radius: var(--radius-md);"></div>
        <div class="skeleton" style="height: 160px; border-radius: var(--radius-md);"></div>
        <div class="skeleton" style="height: 160px; border-radius: var(--radius-md);"></div>
      </div>
    </div>
  </main>

  <!-- Create Category Modal -->
  <div class="modal-overlay" id="createCategoryModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Tạo danh mục mới</h3>
        <button class="modal-close" onclick="closeCreateModal()">
          <i class="ti ti-x"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Tên danh mục</label>
          <input type="text" id="catName" class="form-input" placeholder="Ví dụ: Bài viết CTF">
        </div>
        <div class="form-group">
          <label class="form-label">Mô tả</label>
          <textarea id="catDesc" class="form-textarea" rows="2" placeholder="Mô tả ngắn về danh mục..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Biểu tượng (Tabler Icon)</label>
          <input type="text" id="catIcon" class="form-input" placeholder="ti-flag" value="ti-folder">
          <span class="form-hint">Xem icons tại <a href="https://tabler-icons.io/" target="_blank" style="color: var(--accent);">tabler-icons.io</a></span>
        </div>
        <div class="form-group">
          <label class="form-label">Màu sắc (HEX)</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="color" id="catColorPicker" value="#388bfd" style="width: 44px; height: 38px; padding: 2px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-surface); cursor: pointer;">
            <input type="text" id="catColor" class="form-input" value="#388bfd" placeholder="#388bfd" style="flex: 1;">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Thứ tự hiển thị</label>
          <input type="number" id="catOrder" class="form-input" value="0" min="0" style="width: 120px;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateModal()">Hủy</button>
        <button class="btn btn-primary" id="createCatBtnSubmit" onclick="submitCreateCategory()">
          Tạo danh mục
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/role-guard.js"></script>
  <script>
    async function init() {
      await AuthManager.restoreSession();
      AuthManager.updateUI();
      RoleGuard.applyVisibility();
      setupColorSync();
      await loadCategories();
    }

    async function loadCategories() {
      try {
        const result = await API.categories.getAll();
        if (!result.success || !result.data?.length) {
          document.getElementById('categoriesGrid').innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
              <i class="ti ti-category"></i>
              <h3>Chưa có danh mục nào</h3>
            </div>`;
          return;
        }

        document.getElementById('categoriesGrid').innerHTML = result.data.map(cat => renderCategoryCard(cat)).join('');
      } catch (e) {
        document.getElementById('categoriesGrid').innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <i class="ti ti-alert-circle"></i>
            <h3>Lỗi khi tải danh mục</h3>
          </div>`;
      }
    }

    function renderCategoryCard(cat) {
      const colorStyle = cat.color + '22';
      const iconName = cat.icon.startsWith('ti-') ? cat.icon : 'ti-' + cat.icon;

      return `
        <a href="/category.html?slug=${cat.slug}" class="category-card" style="
          display: flex; flex-direction: column; gap: 12px; padding: 20px;
          background: var(--bg-surface); border: 1px solid var(--border);
          border-radius: var(--radius-md); text-decoration: none; color: inherit;
          transition: all 0.15s; cursor: pointer;"
          onmouseover="this.style.borderColor='${cat.color}'"
          onmouseout="this.style.borderColor='var(--border)'">
          <div style="display: flex; align-items: center; gap: 14px;">
            <div style="width: 48px; height: 48px; border-radius: var(--radius-md); background: ${colorStyle}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
              <i class="ti ${iconName}" style="font-size: 1.375rem; color: ${cat.color};"></i>
            </div>
            <div style="flex: 1; min-width: 0;">
              <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 2px; color: var(--text-primary);">${cat.name}</h3>
              <span style="font-size: 0.8125rem; color: ${cat.color}; font-weight: 500;">
                <i class="ti ti-article" style="font-size: 0.75rem;"></i> ${cat.postCount} bài viết
              </span>
            </div>
          </div>
          ${cat.description ? `
            <p style="font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0;">
              ${cat.description}
            </p>
          ` : ''}
          <div style="font-size: 0.75rem; color: var(--text-muted);">
            <i class="ti ti-chevron-right" style="font-size: 0.875rem;"></i> Xem bài viết
          </div>
        </a>`;
    }

    function setupColorSync() {
      const picker = document.getElementById('catColorPicker');
      const text = document.getElementById('catColor');
      if (picker && text) {
        picker.addEventListener('input', (e) => { text.value = e.target.value; });
        text.addEventListener('input', (e) => { picker.value = e.target.value; });
      }
    }

    function openCreateModal() {
      document.getElementById('createCategoryModal').classList.add('active');
    }

    function closeCreateModal() {
      document.getElementById('createCategoryModal').classList.remove('active');
    }

    async function submitCreateCategory() {
      const name = document.getElementById('catName').value.trim();
      const description = document.getElementById('catDesc').value.trim();
      const icon = document.getElementById('catIcon').value.trim() || 'ti-folder';
      const color = document.getElementById('catColor').value.trim() || '#388bfd';
      const displayOrder = parseInt(document.getElementById('catOrder').value) || 0;

      if (!name) { Toast.show('Vui lòng nhập tên danh mục', 'warning'); return; }

      const btn = document.getElementById('createCatBtnSubmit');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner" style="display: inline-block; width: 16px; height: 16px; border-width: 2px;"></span>';

      try {
        const result = await API.categories.create({ name, description, icon, color, displayOrder });
        if (result.success) {
          Toast.show('Đã tạo danh mục mới', 'success');
          closeCreateModal();
          await loadCategories();
        } else {
          Toast.show(result.message || 'Không thể tạo danh mục', 'error');
        }
      } catch (e) {
        Toast.show('Lỗi khi tạo danh mục', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Tạo danh mục';
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
