<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài viết - CyberForum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/themes/cyber.css">
    <link rel="stylesheet" href="/css/code-block.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/notification-bell.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">
            <img src="/logo2-Photoroom.png" alt="CyberForum" style="height: 32px; width: auto;">
        </a>
        <a href="/" class="btn btn-ghost" style="margin-left: 12px;">
            <i class="ti ti-arrow-left"></i> Quay lại
        </a>

        <div class="navbar-right" style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
            <div class="auth-buttons" id="authButtons" style="display: flex; gap: 8px;">
                <a href="/login.html" class="btn btn-ghost btn-nav">Đăng nhập</a>
                <a href="/register.html" class="btn btn-primary btn-nav">Đăng ký</a>
            </div>

            <div class="user-menu" id="userMenu" style="display: none; align-items: center; gap: 8px;">
                <div class="notification-bell-container" id="notificationBellContainer">
                    <button class="btn btn-ghost btn-icon" id="notificationBellBtn" title="Thông báo" style="position:relative;">
                        <i class="ti ti-bell"></i>
                        <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                    </button>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <div class="notification-dropdown-header">
                            <span>Thông báo</span>
                            <button class="btn btn-link btn-xs" id="markAllReadBtn">Đọc tất cả</button>
                        </div>
                        <div class="notification-dropdown-list" id="notificationDropdownList"></div>
                        <div class="notification-dropdown-footer">
                            <a href="/notifications.html">Xem tất cả thông báo</a>
                        </div>
                    </div>
                </div>

                <div style="position: relative;">
                    <button class="btn btn-ghost btn-user" id="userMenuBtn">
                        <div class="avatar avatar-sm user-avatar" id="navAvatar">U</div>
                        <span class="user-name" id="navUsername">Người dùng</span>
                        <i class="ti ti-chevron-down" style="font-size: 0.75rem;"></i>
                    </button>
                    <div id="userDropdown" style="display: none; position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 6px; min-width: 200px; z-index: 1000;">
                        <a href="/profile.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;">
                            <i class="ti ti-user"></i> Hồ sơ
                        </a>
                        <a href="/reputation.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;">
                            <i class="ti ti-star"></i> Điểm uy tín
                        </a>
                        <a href="/bookmarks.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;">
                            <i class="ti ti-bookmark"></i> Đã lưu
                        </a>
                        <a href="/change-password.html" class="nav-item" style="padding: 8px 12px; display: flex; align-items: center; gap: 8px;">
                            <i class="ti ti-settings"></i> Cài đặt
                        </a>
                        <a href="/admin.html" class="nav-item requires-admin" id="navAdminLink" style="padding: 8px 12px; display: none; align-items: center; gap: 8px;">
                            <i class="ti ti-shield"></i> Quản trị
                        </a>
                        <div style="height: 1px; background: var(--border); margin: 6px 0;"></div>
                        <a href="javascript:void(0)" data-action="logout" style="padding: 8px 12px; color: var(--accent-red); display: flex; align-items: center; gap: 8px;">
                            <i class="ti ti-logout"></i> Đăng xuất
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main style="padding-top: calc(var(--navbar-height) + 20px);">
        <div class="container" style="max-width: 1140px;">
            <div class="row">
                <div class="col-lg-8">
                    <div id="postContent">
                        <div class="card" style="padding: 20px;">
                            <div class="skeleton" style="height: 30px; width: 40%; margin-bottom: 15px;"></div>
                            <div class="skeleton" style="height: 45px; width: 90%; margin-bottom: 20px;"></div>
                            <div class="skeleton" style="height: 150px; margin-bottom: 16px;"></div>
                        </div>
                    </div>

                    <section class="mt-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 style="margin: 0; display: flex; align-items: center; gap: 8px; font-size: 1.25rem;">
                                <i class="ti ti-message" style="color: var(--accent);"></i> Thảo luận công khai
                            </h2>
                            <div id="commentActionArea">
                            </div>
                        </div>
                        <div id="commentsList"></div>
                    </section>
                </div>

                <div class="col-lg-4">
                    <div id="sidebarTarget">
                        <div class="card" style="padding: 20px; text-align: center;">
                            <div class="skeleton" style="height: 64px; width: 64px; border-radius: 50%; margin: 0 auto 15px;"></div>
                            <div class="skeleton" style="height: 20px; width: 60%; margin: 0 auto 10px;"></div>
                            <div class="skeleton" style="height: 15px; width: 80%; margin: 0 auto;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="commentModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Thêm bình luận</h3>
                <button class="modal-close" onclick="closeCommentModal()">
                    <i class="ti ti-x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" id="replyLabel">Nội dung bình luận</label>
                    <div class="editor-container">
                        <div class="editor-toolbar">
                            <button type="button" class="toolbar-btn" onclick="execCommand('bold')"><i class="ti ti-bold"></i></button>
                            <button type="button" class="toolbar-btn" onclick="execCommand('italic')"><i class="ti ti-italic"></i></button>
                            <button type="button" class="toolbar-btn" onclick="execCommand('insertUnorderedList')"><i class="ti ti-list"></i></button>
                            <button type="button" class="toolbar-btn" onclick="commentInsertCode()"><i class="ti ti-code"></i></button>
                        </div>
                        <div class="editor-content" id="commentEditor" contenteditable="true" placeholder="Viết bình luận của bạn..."></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCommentModal()">Hủy</button>
                <button class="btn btn-primary" onclick="submitComment()">Đăng bình luận</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/role-guard.js"></script>
    <script src="/js/post-renderer.js"></script>
    <script src="/js/notification-bell.js"></script>
    <script src="/js/site.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        let currentPost = null;
        let currentUserVote = null;
        let parentCommentId = null;

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!postId) { window.location.href = '/'; return; }
            await AuthManager.restoreSession();
            updateNavbarUI();
            await loadPost();

            // User menu dropdown toggle
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            if (userMenuBtn) {
                userMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userDropdown.style.display = userDropdown.style.display === 'none' ? 'block' : 'none';
                });
            }
            document.addEventListener('click', () => { if (userDropdown) userDropdown.style.display = 'none'; });
            document.querySelectorAll('[data-action="logout"]').forEach(btn => {
                btn.addEventListener('click', (e) => { e.preventDefault(); AuthManager.logout(); });
            });
        });

        // Đã thêm: Hàm đồng bộ và quản lý trạng thái thanh Navbar an toàn hơn
        function updateNavbarUI() {
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');

            if (AuthManager.isAuthenticated()) {
                const user = AuthManager.getUser();
                authButtons.style.display = 'none';
                userMenu.style.display = 'flex';

                document.getElementById('navUsername').textContent = user.displayName || user.username;
                document.getElementById('navAvatar').textContent = user.username.charAt(0).toUpperCase();

                if (AuthManager.isAdmin() || AuthManager.isModerator()) {
                    const adminLink = document.getElementById('navAdminLink');
                    if (adminLink) adminLink.style.display = 'flex';
                }

                if (typeof NotificationBell !== 'undefined') {
                    NotificationBell._initialized = false;
                    NotificationBell.init();
                }
            } else {
                authButtons.style.display = 'flex';
                userMenu.style.display = 'none';
            }
        }

        async function loadPost() {
            try {
                const result = await API.posts.getById(postId);
                if (!result.success) {
                    document.getElementById('postContent').innerHTML = `
                <div class="empty-state">
                  <i class="ti ti-alert-circle"></i>
                  <h3>Không tìm thấy bài viết</h3>
                  <p>Bài viết này có thể đã bị xóa hoặc không tồn tại.</p>
                  <a href="/" class="btn btn-primary mt-3">Về trang chủ</a>
                </div>
              `;
                    return;
                }
                currentPost = result.data;
                currentUserVote = currentPost.userVote;

                renderPostData(currentPost);
                renderSidebarAuthor(currentPost.author);
                renderCommentButton(currentPost);
                await loadComments();
            } catch (error) {
                console.error('Lỗi tải bài viết:', error);
            }
        }

        function renderPostData(post) {
            document.title = `${post.title} - CyberForum`;

            const isAdminOrMod = AuthManager.isAdmin() || AuthManager.isModerator();
            const isAuthor = post.author && post.author.id === getCurrentUserId();

            document.getElementById('postContent').innerHTML = `
            <article class="card" style="margin-bottom: 24px; padding: 20px;">
              <div class="d-flex justify-between align-start mb-3">
                <div>
                  <a href="/category.html?slug=${post.category.slug}" class="category-tag ${post.category.slug}">
                    ${post.category.name}
                  </a>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-ghost btn-sm bookmark-btn ${post.isBookmarked ? 'bookmarked' : ''}" onclick="toggleBookmark()" style="color: ${post.isBookmarked ? 'var(--accent)' : ''};">
                    <i class="${post.isBookmarked ? 'ti ti-bookmark-filled' : 'ti ti-bookmark'}"></i>
                  </button>
                </div>
              </div>

              <h1 style="font-size: 1.5rem; margin-bottom: 12px; line-height: 1.4; color: #ffffff;">
                ${post.isPinned ? '<span class="badge bg-success" style="margin-right: 8px; font-size: 0.625rem; padding: 4px 6px;"><i class="ti ti-pinned"></i> Đã ghim</span>' : ''}
                ${post.isLocked ? '<i class="ti ti-lock" style="color: var(--text-muted); margin-right: 6px;" title="Đã khóa"></i>' : ''}
                ${post.title}
              </h1>

              <div class="post-meta mb-3">
                <div class="d-flex align-center gap-2" style="font-size: 0.85rem;">
                  <span class="text-white" style="font-weight: 500;">By ${post.author.displayName || post.author.username}</span>
                  <span class="text-muted">•</span>
                  <span class="text-muted">${formatDate(post.createdAt)}</span>
                </div>
              </div>

              <div class="post-body" style="line-height: 1.8; margin-bottom: 16px; color: #e0e0e0;">
                ${post.content}
              </div>

              ${post.attachments && post.attachments.length ? `
                <div class="post-attachments mb-3" style="display: flex; flex-wrap: wrap; gap: 10px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: var(--radius-md); border: 1px solid var(--border);">
                  ${post.attachments.map(att => `
                    <a href="${att.fileUrl}" target="_blank" class="btn btn-secondary btn-sm d-inline-flex align-items-center gap-2" style="background: var(--bg-surface); border: 1px solid var(--border);">
                      <i class="ti ti-paperclip" style="color: var(--accent);"></i> ${att.fileName}
                    </a>
                  `).join('')}
                </div>
              ` : ''}

              ${post.tags && post.tags.length ? `
                <div class="post-tags mb-3" style="display:flex; gap:6px;">
                  ${post.tags.map(tag => `<span class="badge bg-dark text-muted" style="border: 1px solid var(--border); font-weight:normal;">#${tag}</span>`).join('')}
                </div>
              ` : ''}

              <div class="d-flex justify-between align-center" style="border-top: 1px solid var(--border); padding-top: 12px;">
                <div class="d-flex gap-2">
                  <button class="btn btn-ghost btn-sm vote-btn upvote ${currentUserVote === 1 ? 'upvoted' : ''}" onclick="vote(1)">
                    <i class="ti ti-arrow-up"></i> <span>${post.upvoteCount}</span>
                  </button>
                  <button class="btn btn-ghost btn-sm vote-btn downvote ${currentUserVote === -1 ? 'downvoted' : ''}" onclick="vote(-1)">
                    <i class="ti ti-arrow-down"></i> <span>${post.downvoteCount}</span>
                  </button>
                </div>
                <div class="d-flex gap-3 text-muted" style="font-size: 0.8125rem;">
                  <span><i class="ti ti-eye"></i> ${post.viewCount} xem</span>
                  <span><i class="ti ti-message"></i> <span id="commentCount">${post.commentCount}</span> phản hồi</span>
                </div>
              </div>

              ${(isAuthor || isAdminOrMod) ? `
                <div class="d-flex gap-2 mt-3" style="border-top: 1px solid var(--border); padding-top: 12px;">
                  <a href="/edit-post.html?id=${post.id}" class="btn btn-ghost btn-sm"><i class="ti ti-edit"></i> Sửa bài</a>
                  <button class="btn btn-ghost btn-sm" onclick="deletePost()" style="color: var(--accent-red);"><i class="ti ti-trash"></i> Xóa bài</button>
                  ${isAdminOrMod ? `
                    <button class="btn btn-ghost btn-sm" onclick="togglePin()" style="color: ${post.isPinned ? 'var(--accent)' : ''};"><i class="ti ti-pinned"></i> ${post.isPinned ? 'Bỏ ghim' : 'Ghim'}</button>
                    <button class="btn btn-ghost btn-sm" onclick="toggleLock()" style="color: ${post.isLocked ? 'var(--accent-orange)' : ''};"><i class="ti ti-lock"></i> ${post.isLocked ? 'Mở khóa' : 'Khóa'}</button>
                  ` : ''}
                </div>
              ` : ''}
            </article>
          `;

            PostRenderer.renderAll();
        }

        function renderSidebarAuthor(author) {
            if (!author) return;
            document.getElementById('sidebarTarget').innerHTML = `
            <div class="card" style="padding: 20px; text-align: center; position: sticky; top: calc(var(--navbar-height) + 20px);">
              <div class="avatar avatar-lg mx-auto mb-3" style="width:64px; height:64px; font-size:1.5rem; background: var(--border); display:flex; align-items:center; justify-content:center; border-radius:50%; color: var(--accent); font-weight:bold;">
                ${(author.displayName || author.username).charAt(0).toUpperCase()}
              </div>
              <h4 class="mb-1" style="color: #ffffff; font-size:1.15rem;">${author.displayName || author.username}</h4>
              <div class="mb-2"><span class="rank-badge rank-${author.rank.toLowerCase()}">${author.rank}</span></div>
              <p class="text-muted small mb-3">${author.bio || 'Chuyên gia bảo mật thông tin.'}</p>
              <div style="border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px;">
                <span class="text-white" style="font-weight: 600;">${author.reputationPoints || 0}</span> <span class="text-muted small">Uy tín</span>
              </div>
            </div>
          `;
        }

        function renderCommentButton(post) {
            const area = document.getElementById('commentActionArea');
            if (AuthManager.isAuthenticated() && !post.isLocked) {
                area.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openCommentModal()"><i class="ti ti-plus"></i> Thêm thảo luận</button>`;
            } else if (post.isLocked) {
                area.innerHTML = `<span class="text-muted small"><i class="ti ti-lock"></i> Đã khóa mục bình luận</span>`;
            } else {
                area.innerHTML = `<a href="/login.html" class="btn btn-ghost btn-sm">Đăng nhập để thảo luận</a>`;
            }
        }

        async function loadComments() {
            try {
                const result = await API.comments.getByPost(postId, { page: 1, pageSize: 50 });
                const container = document.getElementById('commentsList');
                if (result.success && result.data.length) {
                    container.innerHTML = result.data.map(comment => renderCommentNode(comment)).join('');
                    PostRenderer.renderAll();
                } else {
                    container.innerHTML = `<div class="text-muted small py-4 text-center">Chưa có bình luận nào. Hãy đưa ra giải pháp đầu tiên!</div>`;
                }
            } catch (error) {
                console.error('Lỗi tải bình luận:', error);
            }
        }

        function renderCommentNode(comment) {
            return `
            <div class="card mb-3" style="padding: 16px; margin-left: ${comment.parentCommentId ? '20px' : '0px'}; border-left: ${comment.parentCommentId ? '2px solid var(--border)' : ''};">
              <div class="d-flex gap-2 align-items-center justify-between mb-2">
                <div class="d-flex align-items-center gap-2">
                  <div class="avatar avatar-xs" style="width:24px; height:24px; background:var(--bg-surface2); border-radius:50%; text-align:center; line-height:24px; font-weight:bold; font-size:0.75rem;">
                    ${(comment.author.displayName || comment.author.username).charAt(0).toUpperCase()}
                  </div>
                  <span class="text-white small" style="font-weight:500;">${comment.author.displayName || comment.author.username}</span>
                  <span class="rank-badge rank-${comment.author.rank.toLowerCase()}" style="transform: scale(0.8); font-size:0.65rem;">${comment.author.rank}</span>
                </div>
                <span class="text-muted x-small" style="font-size:0.75rem;">${formatDate(comment.createdAt)}</span>
              </div>
              <div class="comment-content" style="color: #cbd5e1; font-size: 0.915rem; line-height: 1.6; padding-left: 2px;">${comment.content}</div>

              <div class="d-flex gap-2 mt-2" style="font-size: 0.8rem;">
                <button class="btn btn-link btn-xs p-0 text-muted" onclick="voteComment(${comment.id}, 1)"><i class="ti ti-arrow-up"></i> ${comment.upvoteCount}</button>
                <button class="btn btn-link btn-xs p-0 text-muted" onclick="voteComment(${comment.id}, -1)"><i class="ti ti-arrow-down"></i> ${comment.downvoteCount}</button>
                ${AuthManager.isAuthenticated() && !currentPost.isLocked ? `
                  <button class="btn btn-link btn-xs p-0 text-muted" style="margin-left: 8px;" onclick="replyToComment(${comment.id})"><i class="ti ti-reply"></i> Trả lời</button>
                ` : ''}
                ${comment.author && (comment.author.id === getCurrentUserId() || AuthManager.isModerator()) ? `
                  <button class="btn btn-link btn-xs p-0 text-danger" style="margin-left: auto;" onclick="deleteComment(${comment.id})"><i class="ti ti-trash"></i></button>
                ` : ''}
              </div>

              ${comment.replies && comment.replies.length ? `
                <div class="mt-2">
                  ${comment.replies.map(reply => renderCommentNode(reply)).join('')}
                </div>
              ` : ''}
            </div>
          `;
        }

        async function vote(direction) {
            if (!AuthManager.requireAuth()) return;
            try {
                if (currentUserVote === direction) {
                    await API.posts.removeVote(postId);
                    currentUserVote = null;
                } else {
                    await API.posts.vote(postId, direction === 1);
                    currentUserVote = direction;
                }
                await loadPost();
            } catch (error) { Toast.show(error.message, 'error'); }
        }

        async function voteComment(commentId, direction) {
            if (!AuthManager.requireAuth()) return;
            try { await API.comments.vote(postId, commentId, direction === 1); await loadComments(); }
            catch (error) { Toast.show(error.message, 'error'); }
        }

        let bookmarkDebounce = false;
        async function toggleBookmark() {
            if (!AuthManager.requireAuth()) return;
            if (bookmarkDebounce) return;
            bookmarkDebounce = true;
            setTimeout(() => { bookmarkDebounce = false; }, 300);

            const btn = document.querySelector('.bookmark-btn');
            const icon = btn.querySelector('i');
            const isBookmarked = btn.classList.contains('bookmarked');

            // Thay đổi nhanh giao diện để người dùng không cảm thấy độ trễ mạng (Optimistic UI)
            if (isBookmarked) {
                btn.classList.remove('bookmarked');
                icon.className = 'ti ti-bookmark';
            } else {
                btn.classList.add('bookmarked');
                icon.className = 'ti ti-bookmark-filled';
            }

            try {
                const result = await API.bookmarks.toggle(postId);
                if (!result.success) {
                    await loadPost(); // Hoàn tác nếu lỗi
                    Toast.show(result.message || 'Có lỗi xảy ra', 'error');
                } else {
                    Toast.show(result.message || (result.data ? 'Đã lưu bài viết' : 'Đã bỏ lưu bài viết'), 'success');
                }
            } catch (error) {
                await loadPost(); // Hoàn tác nếu lỗi
                Toast.show(error.message || 'Có lỗi xảy ra', 'error');
            }
        }

        async function togglePin() { try { await API.posts.pin(postId, !currentPost.isPinned); await loadPost(); } catch (error) { Toast.show(error.message, 'error'); } }
        async function toggleLock() { try { await API.posts.lock(postId, !currentPost.isLocked); await loadPost(); } catch (error) { Toast.show(error.message, 'error'); } }

        async function deletePost() {
            if (!confirm('Bạn có chắc muốn xóa bài viết này?')) return;
            try { await API.posts.delete(postId); Toast.show('Đã xóa bài viết', 'success'); window.location.href = '/'; }
            catch (error) { Toast.show(error.message, 'error'); }
        }

        async function deleteComment(commentId) {
            if (!confirm('Bạn có chắc muốn xóa bình luận này?')) return;
            try { await API.comments.delete(postId, commentId); Toast.show('Đã xóa bình luận', 'success'); await loadComments(); }
            catch (error) { Toast.show(error.message, 'error'); }
        }

        function openCommentModal(parentId = null) {
            parentCommentId = parentId;
            document.getElementById('modalTitle').textContent = parentId ? 'Trả lời bình luận' : 'Thêm bình luận';
            document.getElementById('replyLabel').textContent = parentId ? 'Nội dung phản hồi' : 'Nội dung bình luận';
            document.getElementById('commentModal').classList.add('active');
            document.getElementById('commentEditor').focus();
        }

        function closeCommentModal() {
            document.getElementById('commentModal').classList.remove('active');
            document.getElementById('commentEditor').innerHTML = '';
            parentCommentId = null;
        }

        function replyToComment(commentId) { openCommentModal(commentId); }
        function execCommand(command) { document.execCommand(command, false, null); document.getElementById('commentEditor').focus(); }

        function commentInsertCode() {
            const lang = prompt('Ngôn ngữ (ví dụ: csharp, python, javascript):', 'csharp');
            if (lang) {
                document.getElementById('commentEditor').focus();
                document.execCommand('insertHTML', false, `<pre><code class="language-${lang}">// Nhập code vào đây</code></pre>`);
            }
        }

        async function submitComment() {
            const editor = document.getElementById('commentEditor');
            const content = editor.innerHTML;
            if (!content || content.trim() === '' || content === '<br>') { Toast.show('Vui lòng nhập nội dung bình luận', 'warning'); return; }
            try {
                await API.comments.create(postId, { content, parentCommentId });
                Toast.show('Đã đăng phản hồi thành công', 'success');
                closeCommentModal();
                await loadPost();
            } catch (error) { Toast.show(error.message, 'error'); }
        }

        function getCurrentUserId() { const user = AuthManager.getUser(); return user ? user.id : null; }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            if (seconds < 60) return 'vài giây trước';
            if (seconds < 3600) return `${Math.floor(seconds / 60)} phút trước`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} giờ trước`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)} ngày trước`;
            return date.toLocaleDateString('vi-VN', { day: 'numeric', month: 'short', year: 'numeric' });
        }
    </script>
</body>
</html>
